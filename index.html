<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐱 可爱打字喵测试</title>
    <style>
        :root {
            --primary-color: #FF7EB3;  /* 粉色 */
            --primary-light: #FFB8D9;
            --secondary-color: #7ED3E6;  /* 浅蓝色 */
            --success-color: #7BE7A4;  /* 浅绿色 */
            --error-color: #FF9A8B;  /* 浅橙色 */
            --warning-color: #FFD166;  /* 浅黄色 */
            --bg-gradient: linear-gradient(135deg, #FFD6E7 0%, #C1F0FF 50%, #FFE7C1 100%);  /* 柔和渐变 */
            --card-bg: rgba(255, 255, 255, 0.98);
            --text-color: #5A5A5A;
            --text-muted: #8E8E8E;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--bg-gradient);
            font-family: 'Courier New', '等宽', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: var(--text-color);
            line-height: 1.6;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            margin: 20px 0;
            position: relative;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.8);
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, 
                var(--primary-color) 0%, 
                var(--secondary-color) 50%, 
                var(--warning-color) 100%);
            border-radius: 25px 25px 0 0;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
            font-size: 2.8rem;
            text-shadow: 3px 3px 0px rgba(255, 126, 179, 0.1);
            letter-spacing: 1px;
            position: relative;
            padding-bottom: 20px;
        }
        
        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
        }
        
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 25px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .settings {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        
        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .setting-group label {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .setting-group label::before {
            content: '🎯';
            font-size: 1.2rem;
        }
        
        .setting-group div {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .setting-group input[type="radio"] {
            display: none;
        }
        
        .setting-group label.radio-label {
            padding: 10px 20px;
            background: white;
            border: 2px solid #E0E0E0;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: normal;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .setting-group label.radio-label:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .setting-group input[type="radio"]:checked + .radio-label {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 5px 15px rgba(255, 126, 179, 0.3);
        }
        
        .upload-section {
            margin: 25px 0;
            padding: 25px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
            border-radius: 20px;
            border: 2px dashed var(--primary-light);
            transition: all 0.3s ease;
        }
        
        .upload-section:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255, 126, 179, 0.15);
        }
        
        .upload-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .upload-header h3 {
            color: var(--primary-color);
            margin: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .upload-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(255, 126, 179, 0.3);
        }
        
        .upload-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 126, 179, 0.4);
        }
        
        .upload-btn::before {
            content: '📁';
            font-size: 1.2rem;
        }
        
        .upload-area {
            border: 3px dashed var(--secondary-color);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
            position: relative;
            overflow: hidden;
        }
        
        .upload-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(126, 211, 230, 0.1));
            z-index: 0;
        }
        
        .upload-area:hover {
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.02);
        }
        
        .upload-area.drag-over {
            border-color: var(--primary-color);
            background: rgba(255, 126, 179, 0.1);
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            color: var(--primary-color);
            position: relative;
            z-index: 1;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .upload-area p {
            font-size: 1.2rem;
            color: var(--text-color);
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }
        
        .upload-hint {
            color: var(--text-muted);
            margin-top: 15px;
            font-size: 0.95rem;
            position: relative;
            z-index: 1;
        }
        
        .file-info {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            border: 2px solid var(--success-color);
            display: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .file-info.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        .file-name {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .file-name::before {
            content: '📄';
        }
        
        .file-stats {
            display: flex;
            gap: 25px;
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }
        
        .upload-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .action-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 160px;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .use-btn {
            background: linear-gradient(135deg, var(--success-color), #5AD4A5);
            color: white;
        }
        
        .use-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(123, 231, 164, 0.4);
        }
        
        .use-btn::before {
            content: '✨';
        }
        
        .remove-btn {
            background: linear-gradient(135deg, var(--error-color), #FF7A6B);
            color: white;
        }
        
        .remove-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 154, 139, 0.4);
        }
        
        .remove-btn::before {
            content: '🗑️';
        }
        
        .custom-text-info {
            margin-top: 15px;
            padding: 15px 20px;
            background: linear-gradient(135deg, rgba(123, 231, 164, 0.2), rgba(123, 231, 164, 0.1));
            border: 2px solid var(--success-color);
            border-radius: 15px;
            color: #2E8B57;
            font-size: 1rem;
            display: none;
            text-align: center;
        }
        
        .custom-text-info.show {
            display: block;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 126, 179, 0.05));
            z-index: 0;
        }
        
        .stat-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-light);
        }
        
        .stat-value {
            font-size: 2.8rem;
            font-weight: bold;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
        }
        
        .stat-label {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }
        
        .timer-container {
            text-align: center;
            margin: 30px 0;
            padding: 25px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }
        
        .timer {
            font-size: 5rem;
            font-weight: bold;
            color: var(--primary-color);
            font-family: 'Courier New', monospace;
            text-shadow: 3px 3px 0px rgba(255, 126, 179, 0.1);
            margin: 20px 0;
            position: relative;
            display: inline-block;
            padding: 0 30px;
        }
        
        .timer::before {
            content: '⏱️';
            position: absolute;
            left: -40px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.5rem;
        }
        
        .timer::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
            border-radius: 3px;
        }
        
        .timer.pulse {
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { 
                transform: scale(1);
                text-shadow: 3px 3px 0px rgba(255, 126, 179, 0.1);
            }
            50% { 
                transform: scale(1.05);
                text-shadow: 5px 5px 0px rgba(255, 126, 179, 0.2);
            }
        }
        
        .progress-bar {
            width: 100%;
            height: 15px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            margin: 30px 0;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }
        
        .progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--warning-color));
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .progress::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.5), 
                transparent);
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .text-display-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            position: relative;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
        
        .text-display {
            font-size: 1.4rem;
            line-height: 2;
            min-height: 200px;
            max-height: 350px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            letter-spacing: 0.5px;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }
        
        .text-display span {
            padding: 3px 2px;
            border-radius: 5px;
            transition: all 0.2s ease;
        }
        
        .text-display .current {
            background-color: rgba(255, 126, 179, 0.2);
            box-shadow: 0 0 0 3px var(--primary-color);
            position: relative;
            animation: cursor-blink 1s infinite;
        }
        
        @keyframes cursor-blink {
            0%, 50% { box-shadow: 0 0 0 3px var(--primary-color); }
            51%, 100% { box-shadow: 0 0 0 3px rgba(255, 126, 179, 0.3); }
        }
        
        .text-display .correct {
            color: var(--success-color);
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.05);
        }
        
        .text-display .incorrect {
            color: var(--error-color);
            background-color: rgba(255, 154, 139, 0.1);
            text-decoration: line-through;
            font-weight: bold;
        }
        
        .text-display .to-type {
            color: var(--text-muted);
        }
        
        .input-container {
            position: relative;
            margin: 35px 0;
        }
        
        .input-area {
            width: 100%;
            padding: 25px;
            font-size: 1.4rem;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
            border: 3px solid var(--primary-color);
            border-radius: 20px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: all 0.3s ease;
            color: var(--text-color);
            box-shadow: 0 5px 15px rgba(255, 126, 179, 0.2);
        }
        
        .input-area:focus {
            box-shadow: 0 0 0 5px rgba(255, 126, 179, 0.2);
            transform: translateY(-5px);
        }
        
        .input-area:disabled {
            background: rgba(0, 0, 0, 0.05);
            border-color: #CCCCCC;
            cursor: not-allowed;
            color: #999999;
        }
        
        .input-hint {
            position: absolute;
            top: -30px;
            right: 0;
            color: var(--text-muted);
            font-size: 1rem;
            background: white;
            padding: 8px 15px;
            border-radius: 50px;
            border: 2px solid var(--primary-light);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 20px 40px;
            font-size: 1.3rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 200px;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }
        
        button:hover::before {
            transform: translateX(100%);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .start-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
        }
        
        .start-btn:hover:not(:disabled) {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 126, 179, 0.4);
        }
        
        .start-btn span {
            font-size: 1.5rem;
        }
        
        .reset-btn {
            background: linear-gradient(135deg, var(--secondary-color), #5AC9E6);
            color: white;
        }
        
        .reset-btn:hover:not(:disabled) {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 30px rgba(126, 211, 230, 0.4);
        }
        
        .reset-btn span {
            font-size: 1.5rem;
        }
        
        .result {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
            border-radius: 25px;
            margin-top: 40px;
            display: none;
            animation: slideUp 0.5s ease;
            border: 3px solid rgba(255, 255, 255, 0.8);
            position: relative;
            overflow: hidden;
        }
        
        .result::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 126, 179, 0.05), rgba(126, 211, 230, 0.05));
            z-index: 0;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result.show {
            display: block;
        }
        
        .result h2 {
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 2.5rem;
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 0px rgba(255, 126, 179, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin: 30px 0;
        }
        
        .result-stat {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }
        
        .result-stat:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .result-stat-value {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
        }
        
        .result-stat-label {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: bold;
        }
        
        .history {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 3px solid rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 1;
        }
        
        .history h3 {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .history h3::before {
            content: '📊';
        }
        
        .history-list {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .history-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            min-width: 220px;
            transition: all 0.3s ease;
        }
        
        .history-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        .history-item .speed {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            color: var(--text-muted);
            font-size: 1rem;
            padding: 25px;
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }
        
        .shortcuts {
            background: white;
            padding: 15px 25px;
            border-radius: 15px;
            border: 2px solid var(--primary-light);
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 10px;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .shortcuts::before {
            content: '🎮';
            margin-right: 10px;
            font-size: 1.2rem;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 25px;
                border-radius: 20px;
            }
            
            h1 {
                font-size: 2.2rem;

            .header-info {

                align-items: stretch;

            .timer::before {
                left: -30px;

                min-width: 160px;

                padding: 15px;

            .upload-area {
                padding: 30px;

            .result-stat-value {
                font-size: 2.5rem;
            }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            button {
                width: 100%;
                max-width: 300px;
            }
            
            .result-stats {
                grid-template-columns: 1fr;
            }
            
            .timer {
                font-size: 3rem;
            }
            
            .upload-actions {
                flex-direction: column;
            }
            
            .action-btn {
                width: 100%;
            }
            
            .setting-group div {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱 可爱打字喵测试</h1>
        
        <div class="header-info">
            <div class="settings">
                <div class="setting-group">
                    <label>难度级别</label>
                    <div>
                        <input type="radio" name="difficulty" value="easy" id="easy" checked>
                        <label for="easy" class="radio-label">简单 😊</label>
                        
                        <input type="radio" name="difficulty" value="medium" id="medium">
                        <label for="medium" class="radio-label">中等 🧐</label>
                        
                        <input type="radio" name="difficulty" value="hard" id="hard">
                        <label for="hard" class="radio-label">困难 🤯</label>
                        
                        <input type="radio" name="difficulty" value="custom" id="custom-difficulty">
                        <label for="custom-difficulty" class="radio-label">自定义 📄</label>
                    </div>
                </div>
                
                <div class="setting-group">
                    <label>测试时间</label>
                    <div>
                        <input type="radio" name="time" value="30" id="time30" checked>
                        <label for="time30" class="radio-label">30秒</label>
                        
                        <input type="radio" name="time" value="60" id="time60">
                        <label for="time60" class="radio-label">60秒</label>
                        
                        <input type="radio" name="time" value="120" id="time120">
                        <label for="time120" class="radio-label">120秒</label>
                    </div>
                </div>
            </div>
            
            <div class="shortcuts">
                快捷键：Enter - 开始/结束 | Esc - 重置
            </div>
        </div>
        
        <div class="upload-section">
            <div class="upload-header">
                <h3>📄 上传自定义文档</h3>
                <button class="upload-btn" id="upload-trigger">选择文件</button>
            </div>
            
            <div class="upload-area" id="upload-area">
                <div class="upload-icon">📁</div>
                <p>点击或拖拽文件到此区域上传</p>
                <p class="upload-hint">支持.txt、.doc、.docx、.pdf格式，最大10MB</p>
            </div>
            
            <input type="file" id="file-input" accept=".txt,.doc,.docx,.pdf,.rtf" style="display: none;">
            
            <div class="file-info" id="file-info">
                <div class="file-name" id="file-name"></div>
                <div class="file-stats">
                    <span>大小: <span id="file-size"></span></span>
                    <span>字数: <span id="file-word-count"></span></span>
                </div>
                <div class="upload-actions">
                    <button class="action-btn use-btn" id="use-file">使用此文档</button>
                    <button class="action-btn remove-btn" id="remove-file">移除</button>
                </div>
            </div>
            
            <div class="custom-text-info" id="custom-text-info">
                📝 当前使用自定义文档内容进行打字练习
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="speed">0</div>
                <div class="stat-label">字/分钟</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accuracy">100%</div>
                <div class="stat-label">准确率</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="words">0</div>
                <div class="stat-label">已打字</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="word-count">0</div>
                <div class="stat-label">总字数</div>
            </div>
        </div>
        
        <div class="timer-container">
            <div class="timer" id="timer">30</div>
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>
        
        <div class="text-display-container">
            <div class="text-display" id="text-display"></div>
        </div>
        
        <div class="input-container">
            <div class="input-hint" id="input-hint">按 Enter 键开始测试</div>
            <input type="text" class="input-area" id="input-area" placeholder="开始输入上面的文字..." disabled>
        </div>
        
        <div class="controls">
            <button class="start-btn" id="start-btn">
                <span>▶</span> 开始测试
            </button>
            <button class="reset-btn" id="reset-btn">
                <span>↺</span> 重新开始
            </button>
        </div>
        
        <div class="result" id="result">
            <h2>🎉 测试完成！</h2>
            
            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-stat-value" id="final-speed">0</div>
                    <div class="result-stat-label">字/分钟</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" id="final-accuracy">100%</div>
                    <div class="result-stat-label">准确率</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" id="final-words">0</div>
                    <div class="result-stat-label">正确字数</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" id="final-time">0</div>
                    <div class="result-stat-label">用时(秒)</div>
                </div>
            </div>
            
            <div id="performance-comment"></div>
            
            <div class="history" id="history-section">
                <h3>测试历史</h3>
                <div class="history-list" id="history-list">
                    <!-- 历史记录会动态添加 -->
                </div>
            </div>
        </div>
    </div>
    
    <footer>
        打字测试 - 提升你的打字速度和准确性<br>
        <small>支持中文输入，建议使用实体键盘进行测试</small>
    </footer>

    <script>
        class TypingTest {
            constructor() {
                this.texts = {
                    easy: [
                        "春天来了，万物复苏，大地一片生机勃勃。小鸟在枝头欢快地歌唱，花朵在微风中轻轻摇曳，温暖的阳光洒在每一个角落，给人们带来了无尽的希望和喜悦。让我们一起享受这美好的季节吧！",
                        "学习是一项终身的事业，无论是孩子还是成年人，都应该保持学习的热情。每天坚持阅读，不断积累知识，提升自己的能力，这样才能在快速变化的世界中立于不败之地。知识就是力量！",
                        "健康的生活方式对每个人都至关重要。合理的饮食搭配，适度的体育锻炼，充足的睡眠时间，这些都是保持身体健康的重要因素。让我们一起关注健康，享受美好生活！",
                        "友谊是人生中最珍贵的财富之一。真正的朋友会在你困难时伸出援手，在你快乐时分享喜悦。我们应该珍惜身边的每一位朋友，用心经营每一段友谊，让生活充满温暖和爱。",
                        "生活中总会遇到各种挑战和困难，但正是这些经历让我们变得更加坚强和成熟。保持积极乐观的心态，勇敢面对一切，相信自己一定能够克服困难，迎接更美好的明天！"
                    ],
                    medium: [
                        "在当今信息爆炸的时代，我们每天都会接触到海量的信息，如何从中筛选出有价值的内容成为了一项重要技能。批判性思维不仅能够帮助我们辨别信息的真伪，还能够提升我们的决策能力和问题解决能力。掌握这项技能对于个人发展和社会进步都具有重要意义。",
                        "环境保护已经成为全球性的议题，每个人都应该为保护地球家园贡献自己的力量。从日常生活中的小事做起，比如减少使用一次性塑料制品、节约用水用电、做好垃圾分类等，这些看似微不足道的举动汇聚起来就能产生巨大的积极影响。让我们共同守护美丽的地球！",
                        "人工智能技术正在以前所未有的速度发展，它不仅改变了我们的生活方式，也正在重塑各行各业的工作模式。从智能家居到自动驾驶，从医疗诊断到金融服务，AI的应用无处不在。然而，技术发展的同时也带来了伦理和社会问题，这需要我们共同思考和应对。",
                        "学习一门外语不仅仅是掌握一种沟通工具，更是打开一扇了解不同文化的窗户。通过学习外语，我们可以更深入地理解其他国家和民族的历史、文化、思维方式，从而增进国际间的理解和友谊。在全球化的今天，多语言能力已经成为一项重要的竞争优势。",
                        "有效的沟通是人际交往中至关重要的技能。它不仅仅包括清晰地表达自己的想法，更需要学会倾听他人的意见，理解对方的立场和感受。良好的沟通能够化解矛盾、增进信任、促进合作，无论是在工作还是生活中，都是不可或缺的能力。"
                    ],
                    hard: [
                        "量子计算作为下一代计算技术的代表，其理论基础建立在量子力学之上。与传统计算机使用的二进制比特不同，量子比特具有叠加态和纠缠态的特性，这使得量子计算机在处理特定问题时具有指数级的速度优势。然而，量子系统的脆弱性和纠错问题仍然是当前面临的主要技术挑战，研究人员正在努力开发更稳定的量子比特和更有效的纠错算法。",
                        "区块链技术的核心特点是去中心化和不可篡改性，它为数字信任问题提供了创新的解决方案。通过分布式账本和密码学技术，区块链确保了交易记录的透明性和安全性。这项技术最初应用于比特币等加密货币，但现在已经扩展到供应链管理、数字身份认证、智能合约等多个领域，展现出巨大的应用潜力和商业价值。",
                        "深度学习的快速发展推动了人工智能领域的革命性进步。卷积神经网络在图像识别领域的突破性表现，以及Transformer架构在自然语言处理中的成功应用，都展示了深度学习模型的强大能力。然而，深度学习模型通常被视为'黑箱'，其决策过程缺乏可解释性，这限制了在某些关键领域的应用，如医疗诊断和自动驾驶。",
                        "全球气候变化已经成为人类面临的重大挑战之一。温室气体排放导致的全球变暖引发了极端天气事件频发、海平面上升、生态系统破坏等一系列问题。应对气候变化需要国际社会的共同努力，包括减少化石燃料使用、发展可再生能源、保护森林资源等措施，同时也需要调整社会经济结构以适应新的环境条件。",
                        "人类基因组计划的完成开启了精准医学的新时代。通过对个体基因组信息的分析，医生可以制定更加个性化的治疗方案，预测疾病风险，并开发针对性更强的药物。然而，基因数据的隐私保护、伦理问题以及基因编辑技术的潜在风险也是这一领域必须面对和解决的重要议题。"
                    ],
                    custom: [] // 自定义文档内容
                };
                
                // 测试状态
                this.state = {
                    currentText: '',
                    currentIndex: 0,
                    correctChars: 0,
                    totalChars: 0,
                    errors: [],
                    startTime: null,
                    timer: null,
                    timeLeft: 30,
                    totalTime: 30,
                    isRunning: false,
                    isCompleted: false,
                    history: [],
                    currentFile: null,
                    usingCustomText: false
                };
                
                // DOM元素引用
                this.elements = {};
                
                this.init();
            }
            
            init() {
                // 获取DOM元素
                this.elements = {
                    textDisplay: document.getElementById('text-display'),
                    inputArea: document.getElementById('input-area'),
                    startBtn: document.getElementById('start-btn'),
                    resetBtn: document.getElementById('reset-btn'),
                    timer: document.getElementById('timer'),
                    speed: document.getElementById('speed'),
                    accuracy: document.getElementById('accuracy'),
                    words: document.getElementById('words'),
                    wordCount: document.getElementById('word-count'),
                    progress: document.getElementById('progress'),
                    result: document.getElementById('result'),
                    inputHint: document.getElementById('input-hint'),
                    finalSpeed: document.getElementById('final-speed'),
                    finalAccuracy: document.getElementById('final-accuracy'),
                    finalWords: document.getElementById('final-words'),
                    finalTime: document.getElementById('final-time'),
                    historyList: document.getElementById('history-list'),
                    performanceComment: document.getElementById('performance-comment'),
                    historySection: document.getElementById('history-section'),
                    uploadTrigger: document.getElementById('upload-trigger'),
                    uploadArea: document.getElementById('upload-area'),
                    fileInput: document.getElementById('file-input'),
                    fileInfo: document.getElementById('file-info'),
                    fileName: document.getElementById('file-name'),
                    fileSize: document.getElementById('file-size'),
                    fileWordCount: document.getElementById('file-word-count'),
                    useFileBtn: document.getElementById('use-file'),
                    removeFileBtn: document.getElementById('remove-file'),
                    customTextInfo: document.getElementById('custom-text-info'),
                    customDifficulty: document.getElementById('custom-difficulty')
                };
                
                // 绑定事件
                this.bindEvents();
                
                // 加载初始文本
                this.loadText();
                
                // 加载历史记录
                this.loadHistory();
                
                // 加载保存的自定义文档
                this.loadCustomDocument();
            }
            
            bindEvents() {
                this.elements.startBtn.addEventListener('click', () => this.toggleTest());
                this.elements.resetBtn.addEventListener('click', () => this.resetTest());
                
                this.elements.inputArea.addEventListener('input', (e) => this.handleInput(e));
                this.elements.inputArea.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        this.toggleTest();
                    } else if (e.key === 'Escape') {
                        e.preventDefault();
                        this.resetTest();
                    }
                });
                
                // 文件上传相关事件
                this.elements.uploadTrigger.addEventListener('click', () => {
                    this.elements.fileInput.click();
                });
                
                this.elements.fileInput.addEventListener('change', (e) => {
                    this.handleFileUpload(e.target.files[0]);
                });
                
                this.elements.uploadArea.addEventListener('click', () => {
                    this.elements.fileInput.click();
                });
                
                // 拖拽上传事件
                this.elements.uploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    this.elements.uploadArea.classList.add('drag-over');
                });
                
                this.elements.uploadArea.addEventListener('dragleave', () => {
                    this.elements.uploadArea.classList.remove('drag-over');
                });
                
                this.elements.uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    this.elements.uploadArea.classList.remove('drag-over');
                    
                    if (e.dataTransfer.files.length > 0) {
                        this.handleFileUpload(e.dataTransfer.files[0]);
                    }
                });
                
                this.elements.useFileBtn.addEventListener('click', () => {
                    this.useCustomDocument();
                });
                
                this.elements.removeFileBtn.addEventListener('click', () => {
                    this.removeCustomDocument();
                });
                
                // 难度选择事件
                document.querySelectorAll('input[name="difficulty"]').forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        if (!this.state.isRunning) {
                            if (e.target.value === 'custom') {
                                if (this.texts.custom.length > 0) {
                                    this.useCustomDocument();
                                } else {
                                    alert('请先上传自定义文档');
                                    document.querySelector('input[name="difficulty"][value="easy"]').checked = true;
                                }
                            } else {
                                this.state.usingCustomText = false;
                                this.elements.customTextInfo.classList.remove('show');
                                this.loadText();
                            }
                        }
                    });
                });
                
                // 时间选择事件
                document.querySelectorAll('input[name="time"]').forEach(radio => {
                    radio.addEventListener('change', () => {
                        if (!this.state.isRunning) {
                            this.updateTimerDisplay();
                        }
                    });
                });
            }
            
            handleFileUpload(file) {
                if (!file) return;
                
                // 检查文件类型
                const validTypes = ['text/plain', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', 'application/pdf'];
                const validExtensions = ['.txt', '.doc', '.docx', '.pdf', '.rtf'];
                const fileExtension = '.' + file.name.split('.').pop().toLowerCase();
                
                if (!validTypes.includes(file.type) && !validExtensions.includes(fileExtension)) {
                    alert('不支持的文件格式，请上传.txt、.doc、.docx、.pdf或.rtf文件');
                    return;
                }
                
                // 检查文件大小 (最大10MB)
                if (file.size > 10 * 1024 * 1024) {
                    alert('文件太大，请选择小于10MB的文件');
                    return;
                }
                
                // 保存文件信息
                this.state.currentFile = {
                    name: file.name,
                    size: file.size,
                    type: file.type,
                    lastModified: file.lastModified
                };
                
                // 显示文件信息
                this.elements.fileName.textContent = file.name;
                this.elements.fileSize.textContent = this.formatFileSize(file.size);
                
                // 读取文件内容
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    let content = e.target.result;
                    
                    // 清理和格式化文本内容
                    content = this.cleanTextContent(content);
                    
                    // 计算字数
                    const wordCount = content.length;
                    this.elements.fileWordCount.textContent = wordCount;
                    
                    // 保存到自定义文本数组
                    this.texts.custom = [content];
                    
                    // 显示文件信息区域
                    this.elements.fileInfo.classList.add('show');
                    
                    // 自动选择自定义难度
                    this.elements.customDifficulty.checked = true;
                    
                    // 提示用户使用此文档
                    alert(`文档加载成功！共${wordCount}个字符。\n\n点击"使用此文档"按钮开始使用自定义文档进行打字练习。`);
                };
                
                reader.onerror = () => {
                    alert('文件读取失败，请重试');
                };
                
                // 根据文件类型读取
                if (file.type === 'application/pdf') {
                    alert('PDF文件需要特殊处理，建议转换为文本文件后上传');
                    return;
                } else if (file.type.includes('word') || fileExtension === '.doc' || fileExtension === '.docx') {
                    alert('Word文档可能需要特殊处理，建议另存为文本文件后上传');
                    return;
                } else {
                    // 普通文本文件
                    reader.readAsText(file, 'UTF-8');
                }
            }
            
            cleanTextContent(text) {
                // 移除多余的空格和换行
                text = text.replace(/\r\n/g, '\n');
                text = text.replace(/\r/g, '\n');
                
                // 将多个连续换行替换为单个换行
                text = text.replace(/\n{3,}/g, '\n\n');
                
                // 移除多余的空格
                text = text.replace(/[ \t]{2,}/g, ' ');
                
                // 确保文本以合理的长度分割
                // 如果文本太长，可以截取前5000个字符
                if (text.length > 5000) {
                    text = text.substring(0, 5000) + "\n\n[文档过长，已截取前5000字符]";
                }
                
                return text.trim();
            }
            
            formatFileSize(bytes) {
                if (bytes < 1024) {
                    return bytes + ' B';
                } else if (bytes < 1024 * 1024) {
                    return (bytes / 1024).toFixed(1) + ' KB';
                } else {
                    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
                }
            }
            
            useCustomDocument() {
                if (this.texts.custom.length === 0) {
                    alert('请先上传文档');
                    return;
                }
                
                this.state.usingCustomText = true;
                this.state.currentText = this.texts.custom[0];
                this.state.currentIndex = 0;
                this.state.correctChars = 0;
                this.state.totalChars = 0;
                this.state.errors = [];
                
                // 更新字数统计
                const wordCount = this.state.currentText.length;
                this.elements.wordCount.textContent = wordCount;
                
                // 渲染文本显示
                this.renderText();
                
                // 重置输入框
                this.elements.inputArea.value = '';
                this.elements.inputArea.disabled = true;
                this.elements.startBtn.disabled = false;
                this.elements.inputHint.textContent = '按 Enter 键开始测试';
                
                // 显示自定义文本提示
                this.elements.customTextInfo.classList.add('show');
                
                // 隐藏结果
                this.elements.result.classList.remove('show');
                
                // 保存到本地存储
                this.saveCustomDocument();
                
                alert('已切换到自定义文档！');
            }
            
            removeCustomDocument() {
                if (confirm('确定要移除自定义文档吗？')) {
                    this.texts.custom = [];
                    this.state.currentFile = null;
                    this.state.usingCustomText = false;
                    
                    // 隐藏文件信息
                    this.elements.fileInfo.classList.remove('show');
                    this.elements.customTextInfo.classList.remove('show');
                    
                    // 切换到默认难度
                    document.querySelector('input[name="difficulty"][value="easy"]').checked = true;
                    
                    // 重新加载文本
                    this.loadText();
                    
                    // 从本地存储移除
                    localStorage.removeItem('typingTestCustomDocument');
                    localStorage.removeItem('typingTestCustomFileInfo');
                }
            }
            
            saveCustomDocument() {
                try {
                    if (this.texts.custom.length > 0) {
                        localStorage.setItem('typingTestCustomDocument', JSON.stringify(this.texts.custom));
                    }
                    if (this.state.currentFile) {
                        localStorage.setItem('typingTestCustomFileInfo', JSON.stringify(this.state.currentFile));
                    }
                } catch (e) {
                    console.warn('无法保存自定义文档到本地存储:', e);
                }
            }
            
            loadCustomDocument() {
                try {
                    const savedDoc = localStorage.getItem('typingTestCustomDocument');
                    const savedFileInfo = localStorage.getItem('typingTestCustomFileInfo');
                    
                    if (savedDoc) {
                        this.texts.custom = JSON.parse(savedDoc);
                    }
                    
                    if (savedFileInfo) {
                        this.state.currentFile = JSON.parse(savedFileInfo);
                        
                        // 显示文件信息
                        if (this.state.currentFile && this.texts.custom.length > 0) {
                            this.elements.fileName.textContent = this.state.currentFile.name;
                            this.elements.fileSize.textContent = this.formatFileSize(this.state.currentFile.size);
                            this.elements.fileWordCount.textContent = this.texts.custom[0].length;
                            this.elements.fileInfo.classList.add('show');
                        }
                    }
                } catch (e) {
                    console.warn('无法从本地存储加载自定义文档:', e);
                }
            }
            
            loadText() {
                const difficulty = document.querySelector('input[name="difficulty"]:checked').value;
                
                if (difficulty === 'custom' && this.texts.custom.length > 0) {
                    this.useCustomDocument();
                    return;
                }
                
                const texts = this.texts[difficulty];
                this.state.currentText = texts[Math.floor(Math.random() * texts.length)];
                this.state.currentIndex = 0;
                this.state.correctChars = 0;
                this.state.totalChars = 0;
                this.state.errors = [];
                
                // 更新字数统计
                const wordCount = this.state.currentText.length;
                this.elements.wordCount.textContent = wordCount;
                
                // 渲染文本显示
                this.renderText();
                
                // 重置输入框
                this.elements.inputArea.value = '';
                this.elements.inputArea.disabled = true;
                this.elements.startBtn.disabled = false;
                this.elements.inputHint.textContent = '按 Enter 键开始测试';
                
                // 隐藏自定义文本提示
                this.elements.customTextInfo.classList.remove('show');
                
                // 隐藏结果
                this.elements.result.classList.remove('show');
            }
            
            renderText() {
                const text = this.state.currentText;
                let html = '';
                
                for (let i = 0; i < text.length; i++) {
                    let charClass = 'to-type';
                    
                    if (i < this.state.currentIndex) {
                        // 已输入的字符
                        const isCorrect = !this.state.errors.includes(i);
                        charClass = isCorrect ? 'correct' : 'incorrect';
                    } else if (i === this.state.currentIndex) {
                        // 当前要输入的字符
                        charClass = 'current';
                    }
                    
                    const char = text[i];
                    const charHtml = char === ' ' ? '&nbsp;' : char;
                    html += `<span class="${charClass}" data-index="${i}">${charHtml}</span>`;
                }
                
                this.elements.textDisplay.innerHTML = html;
            }
            
            toggleTest() {
                if (this.state.isRunning) {
                    this.endTest();
                } else {
                    this.startTest();
                }
            }
            
            startTest() {
                if (this.state.isRunning) return;
                
                // 获取选择的测试时间
                this.state.totalTime = parseInt(document.querySelector('input[name="time"]:checked').value);
                this.state.timeLeft = this.state.totalTime;
                
                // 更新状态
                this.state.isRunning = true;
                this.state.isCompleted = false;
                this.state.startTime = Date.now();
                this.state.errors = [];
                
                // 更新UI
                this.elements.timer.textContent = this.state.timeLeft;
                this.elements.timer.classList.add('pulse');
                this.elements.inputArea.disabled = false;
                this.elements.inputArea.focus();
                this.elements.startBtn.innerHTML = '<span>⏸</span> 结束测试';
                this.elements.inputHint.textContent = '正在测试... 按 Enter 键结束';
                
                // 开始计时器
                this.state.timer = setInterval(() => {
                    this.state.timeLeft--;
                    this.elements.timer.textContent = this.state.timeLeft;
                    
                    // 更新进度条
                    const progress = ((this.state.totalTime - this.state.timeLeft) / this.state.totalTime) * 100;
                    this.elements.progress.style.width = `${progress}%`;
                    
                    // 更新实时统计
                    this.updateStats();
                    
                    // 检查时间是否用完
                    if (this.state.timeLeft <= 0) {
                        this.endTest();
                    }
                }, 1000);
                
                // 初始统计更新
                this.updateStats();
            }
            
            handleInput(e) {
                if (!this.state.isRunning) return;
                
                const input = e.target.value;
                const text = this.state.currentText;
                
                // 计算当前索引
                const newIndex = Math.min(input.length, text.length);
                
                // 检查每个字符的正确性
                for (let i = 0; i < newIndex; i++) {
                    const isCorrect = input[i] === text[i];
                    
                    // 更新错误记录
                    const errorIndex = this.state.errors.indexOf(i);
                    if (isCorrect && errorIndex !== -1) {
                        this.state.errors.splice(errorIndex, 1);
                    } else if (!isCorrect && errorIndex === -1) {
                        this.state.errors.push(i);
                    }
                }
                
                // 更新当前索引
                this.state.currentIndex = newIndex;
                
                // 更新已输入字符数
                this.state.totalChars = newIndex;
                
                // 更新正确字符数
                this.state.correctChars = newIndex - this.state.errors.length;
                
                // 重新渲染文本
                this.renderText();
                
                // 更新统计
                this.updateStats();
                
                // 检查是否完成
                if (this.state.currentIndex >= text.length) {
                    this.endTest();
                }
            }
            
            updateStats() {
                // 计算速度（字/分钟）
                const elapsedTime = (Date.now() - this.state.startTime) / 1000 / 60;
                let speed = 0;
                
                if (elapsedTime > 0) {
                    // 使用正确字符数计算速度
                    speed = Math.round(this.state.correctChars / elapsedTime);
                }
                
                // 计算准确率
                let accuracy = 100;
                if (this.state.totalChars > 0) {
                    accuracy = Math.round((this.state.correctChars / this.state.totalChars) * 100);
                }
                
                // 更新显示
                this.elements.speed.textContent = speed;
                this.elements.accuracy.textContent = `${accuracy}%`;
                this.elements.words.textContent = this.state.correctChars;
            }
            
            endTest() {
                if (!this.state.isRunning) return;
                
                // 清除计时器
                clearInterval(this.state.timer);
                
                // 更新状态
                this.state.isRunning = false;
                this.state.isCompleted = true;
                
                // 计算最终结果
                const elapsedTime = this.state.totalTime - this.state.timeLeft;
                const speed = elapsedTime > 0 ? 
                    Math.round((this.state.correctChars / elapsedTime) * 60) : 0;
                const accuracy = this.state.totalChars > 0 ? 
                    Math.round((this.state.correctChars / this.state.totalChars) * 100) : 100;
                
                // 更新最终结果显示
                this.elements.finalSpeed.textContent = speed;
                this.elements.finalAccuracy.textContent = `${accuracy}%`;
                this.elements.finalWords.textContent = this.state.correctChars;
                this.elements.finalTime.textContent = elapsedTime;
                
                // 添加性能评语
                this.addPerformanceComment(speed, accuracy);
                
                // 添加历史记录
                this.addHistory({
                    speed,
                    accuracy,
                    words: this.state.correctChars,
                    time: elapsedTime,
                    difficulty: this.state.usingCustomText ? 'custom' : document.querySelector('input[name="difficulty"]:checked').value,
                    date: new Date().toLocaleString()
                });
                
                // 更新UI
                this.elements.result.classList.add('show');
                this.elements.timer.classList.remove('pulse');
                this.elements.inputArea.disabled = true;
                this.elements.startBtn.innerHTML = '<span>▶</span> 开始测试';
                this.elements.inputHint.textContent = '测试已完成';
                this.elements.startBtn.disabled = false;
                
                // 滚动到结果区域
                this.elements.result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            
            addPerformanceComment(speed, accuracy) {
                let comment = '';
                
                if (speed >= 80) {
                    comment = '🎯 打字速度非常优秀！你已经达到了专业水平！';
                } else if (speed >= 60) {
                    comment = '👍 打字速度良好，继续保持练习！';
                } else if (speed >= 40) {
                    comment = '👌 打字速度一般，多加练习可以提高速度！';
                } else {
                    comment = '💪 需要更多练习来提高打字速度！';
                }
                
                if (accuracy < 95) {
                    comment += ' 注意提高准确率，准确性比速度更重要！';
                }
                
                this.elements.performanceComment.innerHTML = `<p style="margin-top: 15px; color: var(--text-muted);">${comment}</p>`;
            }
            
            addHistory(result) {
                // 添加到状态
                this.state.history.unshift(result);
                
                // 限制历史记录数量
                if (this.state.history.length > 5) {
                    this.state.history = this.state.history.slice(0, 5);
                }
                
                // 保存到本地存储
                this.saveHistory();
                
                // 更新历史记录显示
                this.renderHistory();
            }
            
            renderHistory() {
                if (this.state.history.length === 0) {
                    this.elements.historySection.style.display = 'none';
                    return;
                }
                
                this.elements.historySection.style.display = 'block';
                
                let html = '';
                this.state.history.forEach((record, index) => {
                    const difficultyMap = { 
                        easy: '简单', 
                        medium: '中等', 
                        hard: '困难', 
                        custom: '自定义' 
                    };
                    
                    html += `
                        <div class="history-item">
                            <div class="speed">${record.speed} 字/分</div>
                            <div>准确率: ${record.accuracy}%</div>
                            <div>字数: ${record.words}</div>
                            <div>难度: ${difficultyMap[record.difficulty] || record.difficulty}</div>
                            <div style="font-size: 0.8rem; color: #999; margin-top: 5px;">${record.date}</div>
                        </div>
                    `;
                });
                
                this.elements.historyList.innerHTML = html;
            }
            
            saveHistory() {
                try {
                    localStorage.setItem('typingTestHistory', JSON.stringify(this.state.history));
                } catch (e) {
                    console.warn('无法保存历史记录到本地存储:', e);
                }
            }
            
            loadHistory() {
                try {
                    const saved = localStorage.getItem('typingTestHistory');
                    if (saved) {
                        this.state.history = JSON.parse(saved) || [];
                        this.renderHistory();
                    }
                } catch (e) {
                    console.warn('无法从本地存储加载历史记录:', e);
                }
            }
            
            resetTest() {
                // 清除计时器
                clearInterval(this.state.timer);
                
                // 重置状态
                this.state.isRunning = false;
                this.state.timeLeft = parseInt(document.querySelector('input[name="time"]:checked').value);
                this.state.totalTime = this.state.timeLeft;
                
                // 更新UI
                this.elements.timer.textContent = this.state.timeLeft;
                this.elements.timer.classList.remove('pulse');
                this.elements.progress.style.width = '0%';
                this.elements.inputArea.disabled = true;
                this.elements.startBtn.innerHTML = '<span>▶</span> 开始测试';
                this.elements.startBtn.disabled = false;
                this.elements.inputHint.textContent = '按 Enter 键开始测试';
                this.elements.result.classList.remove('show');
                
                // 重置统计显示
                this.elements.speed.textContent = '0';
                this.elements.accuracy.textContent = '100%';
                this.elements.words.textContent = '0';
                
                // 重新加载文本
                this.loadText();
            }
            
            updateTimerDisplay() {
                if (!this.state.isRunning) {
                    const time = parseInt(document.querySelector('input[name="time"]:checked').value);
                    this.elements.timer.textContent = time;
                    this.state.timeLeft = time;
                    this.state.totalTime = time;
                    this.elements.progress.style.width = '0%';
                }
            }
        }
        
        // 初始化打字测试
        document.addEventListener('DOMContentLoaded', () => {
            new TypingTest();
        });
    </script>
